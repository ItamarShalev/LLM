name: quality

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python and sync (CPU deps + dev group)
        run: |
          uv python install 3.13
          uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format (check only)
        run: uv run ruff format --check .

      - name: ty type check
        run: uv run ty check

      - name: Tests
        run: uv run pytest -q
